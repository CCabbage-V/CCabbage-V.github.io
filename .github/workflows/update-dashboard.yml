name: Update Dashboard Data

on:
  schedule:
    # Runs at 11:30 UTC (13:30 Romanian Time) every Monday through Friday
    # BNR usually publishes the new daily rates around 13:00 local time.
    - cron: '30 11 * * 1-5'
  
  # This allows you to click a button to run the script manually whenever you want
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Update Script
        run: python build_dashboard.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          # Only commit if there are actual changes (prevents errors if the data stayed exactly the same)
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-updated dashboard data" && git push)
